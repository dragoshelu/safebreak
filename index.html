<!doctype html>
<html lang="ro">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Break The Vault</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main id="app">
    <section class="hud top-left">
      <div class="logo">BREAK THE VAULT</div>
      <div id="levelLabel" class="level">LEVEL 1 • Iron Safe</div>
    </section>

    <section class="hud top-right">
      <h3>🏆 Top damage</h3>
      <div id="topDamage"></div>
    </section>

    <section class="center">
      <div id="vaultTitle" class="vault-title">Iron Safe</div>

      <div id="vault" class="vault">
        <div id="cracks" class="cracks"></div>
        <div class="vault-door">
          <div class="dial"></div>
          <div class="handle"></div>
          <div class="bolt b1"></div>
          <div class="bolt b2"></div>
          <div class="bolt b3"></div>
          <div class="bolt b4"></div>
        </div>
      </div>

      <div class="hp-wrap">
        <div id="hpBar" class="hp-bar"></div>
      </div>
      <div id="hpText" class="hp-text">10.000 / 10.000 HP</div>

      <div id="lastHit" class="last-hit">Astept primul cadou...</div>
      <div id="combo" class="combo"></div>
    </section>

    <section class="rules">
      🌹 Rose = 100 damage • 🎁 Cadou = valoare × 100 damage<br>
      Sparge seiful, descopera loot-ul si treci la urmatorul nivel.
    </section>

    <section id="resultPanel" class="result-panel hidden">
      <div class="result-card">
        <div id="dropRarity" class="rarity">LEGENDARY DROP</div>
        <div id="dropIcon" class="drop-icon">💎</div>
        <div id="dropName" class="drop-name">Diamond Core</div>
        <div id="mvpName" class="mvp-name">MVP: Alex</div>
        <div id="mvpDamage" class="mvp-damage">Damage: 12.300</div>
        <div id="nextVault" class="next-vault">Next vault in 8...</div>
      </div>
    </section>

    <div id="particles"></div>

    <div class="test-controls">
      <button onclick="simulateGift('Rose', 1, 'Alex')">Rose</button>
      <button onclick="simulateGift('Finger Heart', 5, 'Mihai')">5 coins</button>
      <button onclick="simulateGift('Galaxy', 100, 'Andrei')">100 coins</button>
      <button onclick="resetGame()">Reset</button>
    </div>
  </main>

  <script src="game.js"></script>
</body>
</html>
