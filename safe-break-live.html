<!doctype html>
<html lang="ro">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Safe Break LIVE</title>
<style>
  :root{
    --hp: 100%;
  }
  html, body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:transparent;
    font-family: Arial, Helvetica, sans-serif;
    color:#fff;
  }
  .wrap{
    width:100vw;
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background: radial-gradient(circle at center, rgba(25,25,35,.92), rgba(5,5,8,.96));
  }
  .game{
    width:min(86vw, 520px);
    text-align:center;
  }
  .title{
    font-size:46px;
    font-weight:900;
    letter-spacing:2px;
    margin-bottom:8px;
    text-shadow:0 4px 18px rgba(255,0,80,.55);
  }
  .subtitle{
    font-size:22px;
    opacity:.9;
    margin-bottom:22px;
  }
  .safe{
    width:250px;
    height:250px;
    margin:0 auto 24px;
    border-radius:34px;
    background:linear-gradient(145deg,#3c3c46,#15151c);
    border:8px solid #6d6d7a;
    box-shadow:0 25px 80px rgba(0,0,0,.75), inset 0 0 35px rgba(255,255,255,.08);
    position:relative;
    transition:transform .12s ease;
  }
  .safe.hit{ transform:translateX(-8px) rotate(-2deg); }
  .door{
    position:absolute;
    inset:25px;
    border-radius:24px;
    border:5px solid #999;
    background:linear-gradient(145deg,#2b2b34,#101015);
  }
  .dial{
    position:absolute;
    width:82px;
    height:82px;
    border-radius:50%;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%);
    background:radial-gradient(circle,#d8d8df,#4e4e58);
    border:7px solid #111;
  }
  .handle{
    position:absolute;
    width:88px;
    height:12px;
    background:#cfcfd6;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%) rotate(25deg);
    border-radius:10px;
  }
  .barBox{
    width:100%;
    height:34px;
    border-radius:20px;
    background:rgba(255,255,255,.16);
    overflow:hidden;
    border:2px solid rgba(255,255,255,.35);
  }
  .bar{
    width:var(--hp);
    height:100%;
    background:linear-gradient(90deg,#ff1744,#ff9100,#ffe600);
    border-radius:20px;
    transition:width .35s ease;
  }
  .hpText{
    margin-top:12px;
    font-size:28px;
    font-weight:800;
  }
  .rules{
    margin-top:22px;
    font-size:22px;
    line-height:1.45;
    opacity:.95;
  }
  .footer{
    margin-top:20px;
    font-size:18px;
    opacity:.7;
  }
  .boom{
    position:fixed;
    inset:0;
    display:none;
    align-items:center;
    justify-content:center;
    background:rgba(0,0,0,.72);
    z-index:10;
    font-size:62px;
    font-weight:900;
    text-align:center;
    text-shadow:0 0 30px #ff0055;
  }
  .boom.show{ display:flex; animation:pulse .9s infinite alternate; }
  @keyframes pulse{ from{transform:scale(1)} to{transform:scale(1.06)} }
  .controls{
    position:fixed;
    left:12px;
    bottom:12px;
    display:flex;
    gap:8px;
    opacity:.15;
    transition:.2s;
  }
  .controls:hover{ opacity:1; }
  button{
    border:0;
    border-radius:10px;
    padding:10px 14px;
    font-weight:700;
    cursor:pointer;
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="game">
    <div class="title">SPARGE SEIFUL</div>
    <div class="subtitle">Fiecare cadou scade viața seifului</div>

    <div id="safe" class="safe">
      <div class="door"></div>
      <div class="dial"></div>
      <div class="handle"></div>
    </div>

    <div class="barBox"><div id="bar" class="bar"></div></div>
    <div id="hpText" class="hpText">10.000 / 10.000 HP</div>

    <div class="rules">
      🌹 Rose = 100 damage<br>
      🎁 Gift = damage după valoarea cadoului<br>
      🔥 La 0 HP seiful se sparge și runda se resetează
    </div>

    <div class="footer">SAFE BREAK LIVE</div>
  </div>
</div>

<div id="boom" class="boom">💥 SEIFUL A FOST SPART 💥</div>

<div class="controls">
  <button onclick="damage(100)">Test Rose</button>
  <button onclick="damage(500)">Test Gift</button>
  <button onclick="resetGame()">Reset</button>
</div>

<script>
  const maxHp = 10000;
  let hp = maxHp;

  function update(){
    const pct = Math.max(0, hp / maxHp * 100);
    document.documentElement.style.setProperty('--hp', pct + '%');
    document.getElementById('hpText').textContent =
      hp.toLocaleString('ro-RO') + ' / ' + maxHp.toLocaleString('ro-RO') + ' HP';
  }

  function damage(amount){
    hp = Math.max(0, hp - amount);
    const safe = document.getElementById('safe');
    safe.classList.add('hit');
    setTimeout(() => safe.classList.remove('hit'), 140);
    update();

    if(hp <= 0){
      document.getElementById('boom').classList.add('show');
      setTimeout(() => {
        document.getElementById('boom').classList.remove('show');
        resetGame();
      }, 3500);
    }
  }

  function resetGame(){
    hp = maxHp;
    update();
  }

  update();

  // Integrarea automată cu cadourile TikTok se adaugă după ce conectăm LIVE-ul.
  // Momentan butoanele de test verifică vizual jocul în LIVE Studio.
</script>
</body>
</html>
